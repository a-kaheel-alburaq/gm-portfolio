{% comment %} {% load static %}

<div class="mobile-view-circles" >
<section id="company-stats" class="py-5" style="padding-bottom:19rem !important;">
    <div class="container">
      <div class="row">
        <div class="stats-container">
          <!-- Branches -->
          <div class="stats-box btn-border-reveal text-center p-4" data-aos="fade-up" data-aos-delay="100">
            <div class="icon-container">
              <i class="fa-solid fa-location-dot fa-3x"></i> <!-- Font Awesome icon for branches -->
            </div>
            <div class="margin-span">
              <span>+</span><span class="counter" data-target="4">0</span>
            </div>
            <p>Branches</p>
          </div>
  
          <!-- Clients -->
          <div class="stats-box btn-border-reveal text-center p-4" data-aos="fade-up" data-aos-delay="200">
            <div class="icon-container">
              <i class="fa-solid fa-shop fa-3x"></i></i> <!-- Font Awesome icon for clients -->
            </div>
            <div class="margin-span">
              <span>+</span><span class="counter" data-target="35">0</span><span>K</span>
            </div>
            <p>Clients</p>
          </div>
  
          <!-- Suppliers -->
          <div class="stats-box btn-border-reveal text-center p-4" data-aos="fade-up" data-aos-delay="300">
            <div class="icon-container">
              <i class="fas fa-handshake fa-3x"></i> <!-- Font Awesome icon for suppliers -->
              <!-- fas fa-warehouse  -->
              <!-- fas fa-shipping-fast  -->
            </div>
            <div class="margin-span">
              <span>+</span><span class="counter" data-target="40">0</span>
            </div>
            <p>Suppliers</p>
          </div>
  
          <!-- Trucks -->
          <div class="stats-box btn-border-reveal text-center p-4" data-aos="fade-up" data-aos-delay="400">
            <div class="icon-container">
              <i class="fas fa-shipping-fast fa-3x"></i> <!-- Font Awesome icon for trucks -->
            </div>
            <div class="margin-span">
              <span>+</span><span class="counter" data-target="70">0</span>
            </div>
            <p>Trucks</p>
          </div>
  
          <!-- Tons of meat -->
          <div class="stats-box btn-border-reveal text-center p-4" data-aos="fade-up" data-aos-delay="500">
            <div class="icon-container">
              <i class="fa-solid fa-scale-balanced fa-3x "></i> <!-- Font Awesome icon for weight -->
            </div>
            <div class="margin-span">
              <span>+</span><span class="counter" data-target="25">0</span><span class="span-margin">K</span>
            </div>
            <p>Tons of meat</p>
          </div>
  
          <!-- Years of experience -->
          <div class="stats-box btn-border-reveal text-center p-4" data-aos="fade-up" data-aos-delay="600">
            <div class="icon-container">
              <i class="fas fa-calendar-alt fa-3x"></i> <!-- Font Awesome icon for years -->
            </div>
            <div class="margin-span">
              <span>+</span><span class="counter" data-target="15">0</span>
            </div>
            <p>Years of experience</p>
          </div>
        </div>
      </div>
    </div>
  </section>
  </div> {% endcomment %}
